<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<title>两点 Dotto · 用心经营每段关系</title>
<style>
  :root{--bg:#FAFCFE;--card:#fff;--ink:#090A0A;--body:#2C2F31;--muted:#72777A;
    --accent:#8278D9;--accentDark:#5E5A9A;--soft:#F5F3FF;--line:#EAEAEA;--line2:#E8E5FF;}
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--body);line-height:1.75;font-size:16px;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Hiragino Sans GB","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:720px;margin:0 auto;padding:0 20px 64px}
  header.site{padding:24px 0 18px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:18px;letter-spacing:.5px;color:var(--ink)}
  .brand .mark{height:26px;width:auto;display:block}
  .brand small{color:var(--muted);font-weight:500;font-size:13px;letter-spacing:1.5px}
  nav.top{margin-top:14px;display:flex;gap:18px;font-size:14px}
  nav.top a{color:var(--muted);text-decoration:none}
  nav.top a:hover,nav.top a.active{color:var(--accentDark)}
  .hero{padding:48px 0 8px}
  .logo{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .logo .mark{height:76px;width:auto;display:block}
  .logo .name{font-size:34px;font-weight:800;letter-spacing:1px;color:var(--ink)}
  .logo .en{color:var(--muted);font-size:15px;letter-spacing:3px;margin-top:6px}
  h1{font-size:24px;margin:18px 0 6px;color:var(--ink)}
  .tag{color:var(--muted);font-size:17px;margin:0 0 18px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:28px 0}
  .card{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px;text-decoration:none;color:var(--ink)}
  .card:hover{border-color:var(--accent)}
  .card .t{font-weight:600;font-size:16px}
  .card .d{color:var(--muted);font-size:13px;margin-top:4px}
  .contact{background:var(--soft);border:1px solid var(--line2);border-radius:14px;padding:18px;margin-top:8px}
  .contact .t{font-weight:600;margin-bottom:6px;color:var(--ink)}
  .contact p{margin:4px 0;color:var(--body);font-size:14.5px}
  .contact a{color:var(--accentDark)}
  footer.site{margin-top:44px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}
  footer.site a{color:var(--muted)}
  @media(max-width:480px){.cards{grid-template-columns:1fr}.logo .name{font-size:30px}.logo .mark{height:64px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <div class="brand"><img class="mark" src="./logo.png" alt="两点 Dotto">两点 <small>DOTTO</small></div>
    <nav class="top">
      <a href="./index.html" class="active">首页</a>
      <a href="./privacy.html">隐私政策</a>
      <a href="./terms.html">用户协议</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="logo">
        <img class="mark" src="./logo.png" alt="两点 Dotto">
        <div>
          <div class="name">两点</div>
          <div class="en">DOTTO</div>
        </div>
      </div>
      <h1>用心经营你在意的每段关系</h1>
      <p class="tag">为重要的人建立档案，记下纪念日、来往与点滴。重要的日子不再错过，每次相处都更走心。</p>
    </section>

    <section class="cards">
      <a class="card" href="./privacy.html">
        <div class="t">隐私政策</div>
        <div class="d">我们收集什么、如何使用与保护你的数据</div>
      </a>
      <a class="card" href="./terms.html">
        <div class="t">用户协议</div>
        <div class="d">使用本应用的条款与说明</div>
      </a>
    </section>

    <section class="contact">
      <div class="t">支持与联系</div>
      <p>有任何问题、反馈或隐私相关请求，欢迎联系我们：</p>
      <p>邮箱：<a href="mailto:dotto2026cs@yeah.net">dotto2026cs@yeah.net</a></p>
      <p>账号与云端数据可在应用内「设置 → 账号与安全 → 删除账号与云端数据」自助删除。</p>
    </section>
  </main>

  <footer class="site">
    <p>© 2026 两点 Dotto · 个人开发者</p>
  </footer>
</div>
</body>
</html>
